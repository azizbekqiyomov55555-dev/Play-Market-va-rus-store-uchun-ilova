<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DramlarUz — Dramatik seriallar platformasi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --gold2: #FFA500;
    --dark: #0a0a1a;
    --card: #12122a;
    --accent: #e040fb;
    --text: #f0e6ff;
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARS background */
  .stars {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 20% 30%, #1a0033 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, #001a33 0%, transparent 60%),
                var(--dark);
  }
  .stars::after {
    content:''; position:absolute; inset:0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff8 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, #fff6 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 10%, #fff8 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 40%, #fff5 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 80%, #fff7 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 90%, #fff6 0%, transparent 100%);
  }

  /* LAYOUT */
  .wrap { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 16px 60px; }

  /* HEADER */
  header {
    text-align: center;
    padding: 40px 0 20px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--gold), var(--gold2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    line-height: 1.1;
  }
  header p {
    margin-top: 8px;
    color: #b0a0cc;
    font-size: 0.95rem;
  }

  /* LANG SWITCHER */
  .lang-bar {
    display: flex; justify-content: center; gap: 10px;
    margin: 18px 0 30px;
  }
  .lang-btn {
    padding: 7px 20px;
    border-radius: 50px;
    border: 2px solid #3a2a5a;
    background: transparent;
    color: #b0a0cc;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn.active, .lang-btn:hover {
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    color: #0a0a1a;
    border-color: var(--gold);
  }

  /* BOOSTER COIN */
  .booster-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 28px 20px 24px;
    text-align: center;
    border: 1px solid #2a1a4a;
    margin-bottom: 22px;
    box-shadow: 0 8px 40px #FFD70022;
  }
  .booster-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.2rem;
    color: var(--gold);
    margin-bottom: 6px;
  }
  .booster-section .sub {
    font-size: 0.85rem;
    color: #9080b0;
    margin-bottom: 20px;
  }

  /* COIN */
  .coin-wrap {
    display: flex; justify-content: center; align-items: center;
    margin-bottom: 20px;
  }
  .coin {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffe566, #ffa500 60%, #cc7700);
    border: 5px solid #FFD700;
    box-shadow: 0 0 0 4px #ffd70033, 0 8px 32px #FFD70055, inset 0 -4px 12px #cc770066;
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem;
    cursor: pointer;
    user-select: none;
    transition: transform 0.08s, box-shadow 0.08s;
    position: relative;
    animation: floatCoin 3s ease-in-out infinite;
  }
  .coin:active { transform: scale(0.91); box-shadow: 0 2px 10px #FFD70044; }
  @keyframes floatCoin {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .coin.clicked { animation: popCoin 0.15s ease; }
  @keyframes popCoin {
    0% { transform: scale(1); }
    50% { transform: scale(1.18); }
    100% { transform: scale(1); }
  }

  /* PROGRESS BAR */
  .progress-wrap {
    background: #1e1a38;
    border-radius: 50px;
    height: 16px;
    overflow: hidden;
    margin-bottom: 10px;
    border: 1px solid #3a2a6a;
  }
  .progress-bar {
    height: 100%;
    border-radius: 50px;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    transition: width 0.2s;
    box-shadow: 0 0 10px var(--gold);
  }
  .progress-info {
    display: flex; justify-content: space-between;
    font-size: 0.82rem;
    color: #9080b0;
  }
  .progress-info .clicks-left {
    color: var(--gold);
    font-weight: 700;
  }

  /* COLOR RINGS */
  .rings-wrap {
    display: flex; justify-content: center; gap: 8px;
    margin-top: 18px; flex-wrap: wrap;
  }
  .ring {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 3px solid transparent;
    box-shadow: 0 0 10px 2px currentColor;
    transition: transform 0.2s;
    animation: none;
  }
  .ring.active { transform: scale(1.25); animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }

  /* TIMER */
  .timer-bar {
    margin-top: 16px;
    font-size: 0.85rem;
    color: #9080b0;
    display: none;
    text-align: center;
  }
  .timer-bar .t { color: var(--gold); font-weight: 700; }

  /* PROFILE SECTION */
  .profile-section {
    background: var(--card);
    border-radius: var(--radius);
    padding: 22px 20px;
    border: 1px solid #2a1a4a;
    margin-bottom: 22px;
  }
  .profile-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .profile-avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin-bottom: 12px;
  }
  .profile-name {
    font-size: 1rem; font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }
  .profile-score {
    font-size: 0.9rem;
    color: var(--gold);
  }

  /* DRAMAS SECTION */
  .dramas-section h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    color: var(--text);
    margin-bottom: 14px;
  }
  .drama-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 14px;
    border: 1px solid #2a1a4a;
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .drama-card:hover { border-color: var(--gold); box-shadow: 0 4px 20px #FFD70022; }
  .drama-thumb {
    width: 60px; height: 60px;
    border-radius: 10px;
    font-size: 2rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .drama-info h3 { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .drama-info p { font-size: 0.8rem; color: #7060a0; }
  .drama-badge {
    margin-left: auto;
    background: linear-gradient(135deg,var(--gold),var(--gold2));
    color: #0a0a1a;
    font-size: 0.72rem; font-weight: 800;
    padding: 4px 10px; border-radius: 50px;
    flex-shrink: 0;
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #0e0e22ee;
    backdrop-filter: blur(12px);
    border-top: 1px solid #2a1a4a;
    display: flex; justify-content: space-around;
    padding: 10px 0 16px;
    z-index: 100;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer;
    color: #5a4a7a;
    font-size: 0.72rem; font-weight: 700;
    transition: color 0.2s;
    padding: 4px 16px;
  }
  .nav-item.active { color: var(--gold); }
  .nav-item span { font-size: 1.4rem; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; }

  /* FLOAT SCORE */
  .float-score {
    position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
    font-size: 1.8rem; font-weight: 900; color: var(--gold);
    pointer-events: none; z-index: 200;
    opacity: 0; animation: none;
  }
  .float-score.show {
    animation: floatUp 0.8s ease forwards;
  }
  @keyframes floatUp {
    0% { opacity:1; transform: translateX(-50%) translateY(0) scale(1); }
    100% { opacity:0; transform: translateX(-50%) translateY(-60px) scale(1.5); }
  }

  /* SETTINGS PAGE */
  .settings-row {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 18px;
    margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid #2a1a4a;
  }
  .settings-row .label { font-size: 0.95rem; font-weight: 600; }
  .settings-row .sub { font-size: 0.8rem; color: #7060a0; margin-top: 2px; }

  /* RESPONSIVE */
  @media(max-width:360px){
    header h1 { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="float-score" id="floatScore">+1 🌟</div>

<div class="wrap">

  <!-- HEADER -->
  <header>
    <h1 id="appTitle">DramlarUz</h1>
    <p id="appSubtitle">Dramatik seriallar dunyosi</p>
  </header>

  <!-- LANG SWITCHER -->
  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('uz')">O'Z</button>
    <button class="lang-btn" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>

  <!-- PAGE: HOME -->
  <div class="page active" id="pageHome">

    <!-- BOOSTER -->
    <div class="booster-section">
      <h2 id="boosterTitle">🚀 Booster</h2>
      <div class="sub" id="boosterSub">Tangaga bosing va rang yig'ing!</div>

      <div class="coin-wrap">
        <div class="coin" id="coin" onclick="clickCoin()">🪙</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar" style="width:100%"></div>
      </div>
      <div class="progress-info">
        <span id="clicksLabel">Bosishlar</span>
        <span class="clicks-left"><span id="clicksLeft">500</span>/500</span>
      </div>

      <!-- COLOR RINGS -->
      <div class="rings-wrap" id="ringsWrap"></div>

      <!-- TIMER -->
      <div class="timer-bar" id="timerBar">
        <span id="timerLabel">Qayta to'ladi:</span> <span class="t" id="timerText">10:00</span>
      </div>
    </div>

    <!-- DRAMAS -->
    <div class="dramas-section">
      <h2 id="dramasTitle">🎬 Seriallar</h2>
      <div id="dramaList"></div>
    </div>

  </div>

  <!-- PAGE: PROFILE -->
  <div class="page" id="pageProfile">
    <div class="profile-section" style="margin-top:10px">
      <div class="profile-avatar">👤</div>
      <div class="profile-name" id="profileName">Foydalanuvchi</div>
      <div class="profile-score">⭐ <span id="profileScore">0</span> <span id="profileScoreLabel">ball</span></div>
    </div>

    <div class="booster-section">
      <h2 id="profileBoosterTitle">Mening natijam</h2>
      <div style="font-size:3rem;margin:10px 0">🏆</div>
      <div style="font-size:1.5rem;font-weight:800;color:var(--gold)" id="profileTotalClicks">0</div>
      <div style="font-size:0.85rem;color:#9080b0;margin-top:4px" id="profileClicksLabel2">jami bosish</div>
    </div>
  </div>

  <!-- PAGE: SETTINGS -->
  <div class="page" id="pageSettings">
    <div style="padding-top:10px">
      <div class="settings-row">
        <div>
          <div class="label" id="langSettingLabel">Til / Язык / Language</div>
          <div class="sub" id="langSettingSub">Joriy til</div>
        </div>
        <div class="lang-bar" style="margin:0">
          <button class="lang-btn active" id="sLangUz" onclick="setLang('uz')">O'Z</button>
          <button class="lang-btn" id="sLangRu" onclick="setLang('ru')">RU</button>
          <button class="lang-btn" id="sLangEn" onclick="setLang('en')">EN</button>
        </div>
      </div>
      <div class="settings-row">
        <div>
          <div class="label" id="aboutLabel">DramlarUz haqida</div>
          <div class="sub">v1.0.0</div>
        </div>
        <span style="font-size:1.4rem">ℹ️</span>
      </div>
    </div>
  </div>

</div><!-- /wrap -->

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="navHome" onclick="showPage('Home')">
    <span>🏠</span>
    <div id="navHomeLabel">Bosh</div>
  </div>
  <div class="nav-item" id="navProfile" onclick="showPage('Profile')">
    <span>👤</span>
    <div id="navProfileLabel">Profil</div>
  </div>
  <div class="nav-item" id="navSettings" onclick="showPage('Settings')">
    <span>⚙️</span>
    <div id="navSettingsLabel">Sozlamalar</div>
  </div>
</div>

<script>
// ===== STATE =====
let clicks = 500;
let totalClicks = 0;
let colors = [];
let timerActive = false;
let timerInterval = null;
let timerSeconds = 600; // 10 min
const MAX_CLICKS = 500;
const REFILL_TIME = 600;
const COLORS_ARRAY = [
  '#FF4466','#FF8800','#FFD700','#44FF88','#00CCFF','#AA44FF','#FF44CC','#44FFFF'
];

// ===== TRANSLATIONS =====
const T = {
  uz: {
    subtitle: 'Dramatik seriallar dunyosi',
    boosterTitle: '🚀 Booster',
    boosterSub: 'Tangaga bosing va rang yig\'ing!',
    clicksLabel: 'Bosishlar',
    dramasTitle: '🎬 Seriallar',
    timerLabel: 'Qayta to\'ladi:',
    profileName: 'Profil',
    profileScoreLabel: 'ball',
    profileClicksLabel2: 'jami bosish',
    profileBoosterTitle: 'Mening natijam',
    navHome: 'Bosh',
    navProfile: 'Profil',
    navSettings: 'Sozlamalar',
    langSettingSub: 'Joriy til: O\'zbek',
    aboutLabel: 'DramlarUz haqida',
    empty: 'Bosishlar tugadi! Kuting...',
    dramas: [
      { title: 'Sevgi va Qismat', genre: '💔 Melodrama', badge: 'Yangi' },
      { title: 'Ko\'z Yoshlar', genre: '😢 Drama', badge: 'TOP' },
      { title: 'Qaytish', genre: '🌹 Romantika', badge: 'HD' },
      { title: 'Taqdir', genre: '⚡ Triller', badge: 'Yangi' },
    ]
  },
  ru: {
    subtitle: 'Мир драматических сериалов',
    boosterTitle: '🚀 Бустер',
    boosterSub: 'Нажмите на монету и собирайте цвета!',
    clicksLabel: 'Нажатий',
    dramasTitle: '🎬 Сериалы',
    timerLabel: 'Пополнится через:',
    profileName: 'Профиль',
    profileScoreLabel: 'очков',
    profileClicksLabel2: 'всего нажатий',
    profileBoosterTitle: 'Мой результат',
    navHome: 'Главная',
    navProfile: 'Профиль',
    navSettings: 'Настройки',
    langSettingSub: 'Текущий язык: Русский',
    aboutLabel: 'О приложении DramlarUz',
    empty: 'Нажатия закончились! Ждите...',
    dramas: [
      { title: 'Любовь и Судьба', genre: '💔 Мелодрама', badge: 'Новый' },
      { title: 'Слёзы', genre: '😢 Драма', badge: 'ТОП' },
      { title: 'Возвращение', genre: '🌹 Романтика', badge: 'HD' },
      { title: 'Судьба', genre: '⚡ Триллер', badge: 'Новый' },
    ]
  },
  en: {
    subtitle: 'World of Dramatic Series',
    boosterTitle: '🚀 Booster',
    boosterSub: 'Tap the coin and collect colors!',
    clicksLabel: 'Taps',
    dramasTitle: '🎬 Series',
    timerLabel: 'Refills in:',
    profileName: 'Profile',
    profileScoreLabel: 'points',
    profileClicksLabel2: 'total taps',
    profileBoosterTitle: 'My Result',
    navHome: 'Home',
    navProfile: 'Profile',
    navSettings: 'Settings',
    langSettingSub: 'Current language: English',
    aboutLabel: 'About DramlarUz',
    empty: 'Taps depleted! Please wait...',
    dramas: [
      { title: 'Love & Fate', genre: '💔 Melodrama', badge: 'New' },
      { title: 'Tears', genre: '😢 Drama', badge: 'TOP' },
      { title: 'Return', genre: '🌹 Romance', badge: 'HD' },
      { title: 'Destiny', genre: '⚡ Thriller', badge: 'New' },
    ]
  }
};

let currentLang = 'uz';

function setLang(lang) {
  currentLang = lang;
  // Update lang buttons
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn').forEach(b => {
    if (b.textContent.toLowerCase().includes(lang === 'uz' ? 'o' : lang === 'ru' ? 'ru' : 'en')) {
      b.classList.add('active');
    }
  });
  applyTranslations();
}

function applyTranslations() {
  const t = T[currentLang];
  document.getElementById('appSubtitle').textContent = t.subtitle;
  document.getElementById('boosterTitle').textContent = t.boosterTitle;
  document.getElementById('boosterSub').textContent = t.boosterSub;
  document.getElementById('clicksLabel').textContent = t.clicksLabel;
  document.getElementById('dramasTitle').textContent = t.dramasTitle;
  document.getElementById('timerLabel').textContent = t.timerLabel;
  document.getElementById('navHomeLabel').textContent = t.navHome;
  document.getElementById('navProfileLabel').textContent = t.navProfile;
  document.getElementById('navSettingsLabel').textContent = t.navSettings;
  document.getElementById('profileScoreLabel').textContent = t.profileScoreLabel;
  document.getElementById('profileClicksLabel2').textContent = t.profileClicksLabel2;
  document.getElementById('profileBoosterTitle').textContent = t.profileBoosterTitle;
  document.getElementById('langSettingSub').textContent = t.langSettingSub;
  document.getElementById('aboutLabel').textContent = t.aboutLabel;
  renderDramas();

  // Settings lang buttons
  ['sLangUz','sLangRu','sLangEn'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const map = {uz:'sLangUz', ru:'sLangRu', en:'sLangEn'};
  document.getElementById(map[currentLang])?.classList.add('active');
}

// ===== DRAMA LIST =====
const EMOJIS = ['🎭','🌹','💔','⚡','🌙','🔥'];
function renderDramas() {
  const t = T[currentLang];
  const list = document.getElementById('dramaList');
  list.innerHTML = '';
  t.dramas.forEach((d, i) => {
    const div = document.createElement('div');
    div.className = 'drama-card';
    div.innerHTML = `
      <div class="drama-thumb" style="background:linear-gradient(135deg,${COLORS_ARRAY[i*2%8]},${COLORS_ARRAY[(i*2+3)%8]})">${EMOJIS[i%6]}</div>
      <div class="drama-info">
        <h3>${d.title}</h3>
        <p>${d.genre}</p>
      </div>
      <div class="drama-badge">${d.badge}</div>
    `;
    list.appendChild(div);
  });
}

// ===== BOOSTER COIN =====
function clickCoin() {
  if (clicks <= 0) return;
  clicks--;
  totalClicks++;

  // Animate coin
  const coin = document.getElementById('coin');
  coin.classList.remove('clicked');
  void coin.offsetWidth;
  coin.classList.add('clicked');

  // Add color ring
  if (colors.length < 8) {
    const c = COLORS_ARRAY[colors.length];
    colors.push(c);
    renderRings();
  }

  // Update progress
  updateProgress();

  // Float score
  showFloat();

  // Profile score
  document.getElementById('profileScore').textContent = totalClicks;
  document.getElementById('profileTotalClicks').textContent = totalClicks;

  // If empty, start timer
  if (clicks <= 0) {
    startRefillTimer();
  }
}

function renderRings() {
  const wrap = document.getElementById('ringsWrap');
  wrap.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const r = document.createElement('div');
    r.className = 'ring' + (i < colors.length ? ' active' : '');
    r.style.background = i < colors.length ? colors[i] : '#2a1a4a';
    r.style.color = i < colors.length ? colors[i] : 'transparent';
    if (i < colors.length) {
      r.style.borderColor = colors[i];
    } else {
      r.style.borderColor = '#2a1a4a';
      r.style.boxShadow = 'none';
    }
    wrap.appendChild(r);
  }
}

function updateProgress() {
  const pct = (clicks / MAX_CLICKS) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('clicksLeft').textContent = clicks;
}

function showFloat() {
  const el = document.getElementById('floatScore');
  el.classList.remove('show');
  void el.offsetWidth;
  el.textContent = '+1 🌟';
  el.classList.add('show');
}

function startRefillTimer() {
  if (timerActive) return;
  timerActive = true;
  timerSeconds = REFILL_TIME;
  document.getElementById('timerBar').style.display = 'block';
  timerInterval = setInterval(() => {
    timerSeconds--;
    const m = Math.floor(timerSeconds / 60).toString().padStart(2,'0');
    const s = (timerSeconds % 60).toString().padStart(2,'0');
    document.getElementById('timerText').textContent = m + ':' + s;
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerActive = false;
      clicks = MAX_CLICKS;
      colors = [];
      renderRings();
      updateProgress();
      document.getElementById('timerBar').style.display = 'none';
    }
  }, 1000);
}

// ===== NAVIGATION =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('nav' + name).classList.add('active');
}

renderRings();
applyTranslations();
