<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DramlarUz</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #FFD700;
  --gold2: #FFC200;
  --gold3: #ffb300;
  --gold-light: #fff3b0;
  --dark: #09090f;
  --dark2: #111120;
  --card: #16162a;
  --card2: #1c1c35;
  --accent: #a259ff;
  --accent2: #7c3aed;
  --text: #f0f0ff;
  --sub: #8888aa;
  --red: #ff4d6d;
  --green: #00e676;
  --border: rgba(255,215,0,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--dark);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}

/* starfield */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(1px 1px at 5% 8%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 80%, rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 20%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 65%, rgba(255,215,0,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 30%, rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 82% 75%, rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 12%, rgba(255,215,0,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 90%, rgba(255,255,255,0.2) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 55%, rgba(255,255,255,0.35) 0%,transparent 100%);
  pointer-events:none;z-index:0;
}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  background:rgba(9,9,15,0.94);
  backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(255,215,0,0.12);
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;
}
.logo{
  font-family:'Cinzel',serif;font-size:20px;font-weight:900;
  background:linear-gradient(90deg,#FFD700,#fff3b0,#FFD700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:2px;
}
.lang-switcher{display:flex;gap:5px;}
.lang-btn{
  background:var(--card);border:1px solid rgba(255,215,0,0.2);
  color:var(--sub);font-family:'Nunito',sans-serif;
  font-size:11px;font-weight:800;padding:4px 9px;
  border-radius:20px;cursor:pointer;transition:all 0.2s;
}
.lang-btn.active,.lang-btn:hover{background:rgba(255,215,0,0.15);color:var(--gold);border-color:var(--gold);}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(9,9,15,0.97);
  backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,215,0,0.12);
  display:flex;justify-content:space-around;
  padding:8px 0 14px;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;opacity:0.45;transition:all 0.25s;
  font-size:10px;font-weight:800;color:var(--sub);
  background:none;border:none;padding:0 18px;letter-spacing:0.5px;
}
.nav-item.active{opacity:1;color:var(--gold);}
.nav-item .icon{font-size:20px;}

/* PAGES */
.page{display:none;padding:14px 14px 88px;}
.page.active{display:block;}

/* ═══════════════ ORNATE COIN ═══════════════ */
.coin-page{display:flex;flex-direction:column;align-items:center;padding-top:16px;}

.coin-balance{
  background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(255,180,0,0.04));
  border:1px solid rgba(255,215,0,0.25);
  border-radius:20px;padding:14px 28px;
  text-align:center;margin-bottom:24px;width:100%;
  box-shadow:0 0 30px rgba(255,215,0,0.05);
}
.coin-balance .label{font-size:12px;color:var(--sub);margin-bottom:4px;letter-spacing:1px;text-transform:uppercase;}
.coin-balance .amount{
  font-size:34px;font-weight:900;color:var(--gold);
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Cinzel',serif;
}

/* COIN WRAPPER */
.coin-wrap{
  position:relative;width:220px;height:220px;
  margin-bottom:22px;cursor:pointer;
  filter:drop-shadow(0 0 30px rgba(255,200,0,0.4));
}

/* SVG coin layers */
.coin-svg{width:220px;height:220px;display:block;}

/* Pulsing rings */
.coin-ring-anim{
  position:absolute;inset:-10px;border-radius:50%;pointer-events:none;
}
.cring{
  position:absolute;inset:0;border-radius:50%;
  border:1.5px solid rgba(255,215,0,0.35);
  animation:cring-out 2.4s ease-out infinite;opacity:0;
}
.cring:nth-child(2){animation-delay:0.8s;}
.cring:nth-child(3){animation-delay:1.6s;}
@keyframes cring-out{
  0%{transform:scale(1);opacity:0.7;}
  100%{transform:scale(1.6);opacity:0;}
}

/* tap float */
.tap-float{
  position:absolute;font-weight:900;font-size:22px;
  color:var(--gold);pointer-events:none;
  animation:float-up 0.9s ease-out forwards;
  text-shadow:0 0 12px rgba(255,215,0,0.9);
  font-family:'Cinzel',serif;z-index:10;
}
@keyframes float-up{
  0%{opacity:1;transform:translateY(0) scale(1);}
  100%{opacity:0;transform:translateY(-90px) scale(1.4);}
}

/* coin press */
.coin-wrap:active{transform:scale(0.94);}
.coin-wrap{transition:transform 0.08s;}

/* ENERGY */
.energy-bar-wrap{width:100%;max-width:320px;margin-bottom:18px;}
.energy-label{display:flex;justify-content:space-between;font-size:11px;color:var(--sub);margin-bottom:7px;letter-spacing:0.5px;}
.energy-bar{
  height:11px;background:rgba(255,255,255,0.06);
  border-radius:10px;overflow:hidden;
  border:1px solid rgba(255,215,0,0.12);
}
.energy-fill{
  height:100%;
  background:linear-gradient(90deg,#b8860b,#ffd700,#fff3b0,#ffd700);
  background-size:200% 100%;
  animation:gold-flow 2s linear infinite;
  border-radius:10px;transition:width 0.3s;
}
@keyframes gold-flow{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
.refill-text{text-align:center;font-size:11px;color:var(--sub);margin-top:6px;}
.refill-text span{color:var(--gold);font-weight:700;}

/* BOOSTS */
.boosts-section{width:100%;margin-top:16px;}
.boosts-section h3{
  font-size:11px;color:var(--sub);text-transform:uppercase;
  letter-spacing:2px;margin-bottom:12px;
  font-family:'Cinzel',serif;
}
.boost-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px;}
.boost-card{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border:1px solid rgba(255,215,0,0.12);
  border-radius:14px;padding:13px;
  display:flex;align-items:center;gap:10px;
  cursor:pointer;transition:all 0.2s;
  position:relative;overflow:hidden;
}
.boost-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,215,0,0.06),transparent);
  opacity:0;transition:opacity 0.2s;
}
.boost-card:hover::before{opacity:1;}
.boost-card:hover{border-color:rgba(255,215,0,0.35);box-shadow:0 4px 20px rgba(255,215,0,0.1);}
.boost-icon{font-size:26px;}
.boost-info .name{font-size:12px;font-weight:800;color:var(--text);}
.boost-info .cost{font-size:11px;color:var(--gold);display:flex;align-items:center;gap:3px;margin-top:2px;}

/* ═══════════════ PROFILE ═══════════════ */
.profile-header{display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:10px;}
.avatar{
  width:78px;height:78px;border-radius:50%;
  background:linear-gradient(135deg,#2a1060,#5a1fb5);
  display:flex;align-items:center;justify-content:center;font-size:34px;
  border:2px solid rgba(255,215,0,0.5);
  box-shadow:0 0 25px rgba(255,215,0,0.2),inset 0 0 20px rgba(0,0,0,0.3);
}
.profile-name{font-size:19px;font-weight:900;font-family:'Cinzel',serif;color:var(--gold-light);}
.profile-coins{display:flex;align-items:center;gap:6px;font-size:15px;color:var(--gold);font-weight:700;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:6px;width:100%;}
.stat-card{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border-radius:13px;padding:13px 6px;text-align:center;
  border:1px solid rgba(255,215,0,0.1);
}
.stat-card .val{font-size:20px;font-weight:900;color:var(--gold);font-family:'Cinzel',serif;}
.stat-card .lbl{font-size:9px;color:var(--sub);margin-top:3px;letter-spacing:0.5px;text-transform:uppercase;}
.profile-section{width:100%;margin-top:18px;}
.profile-section h3{font-size:10px;color:var(--sub);text-transform:uppercase;letter-spacing:2px;margin-bottom:9px;font-family:'Cinzel',serif;}
.profile-row{
  background:linear-gradient(135deg,var(--card),var(--card2));
  border-radius:13px;padding:13px 15px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:7px;border:1px solid rgba(255,215,0,0.08);
  cursor:pointer;transition:all 0.2s;
}
.profile-row:hover{border-color:rgba(255,215,0,0.25);background:linear-gradient(135deg,#1e1e38,#222240);}
.profile-row .left{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;}
.profile-row .r-icon{font-size:17px;}
.profile-row .arrow{color:var(--sub);font-size:16px;}

/* ═══════════════ SUPPORT BOT ═══════════════ */
.support-page{display:flex;flex-direction:column;height:calc(100vh - 130px);}
.chat-header{
  background:linear-gradient(135deg,rgba(255,215,0,0.1),rgba(162,89,255,0.08));
  border:1px solid rgba(255,215,0,0.2);
  border-radius:16px;padding:14px 16px;
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
}
.bot-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#a259ff);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;border:2px solid rgba(255,215,0,0.3);
  flex-shrink:0;
  box-shadow:0 0 16px rgba(162,89,255,0.4);
}
.bot-info .bot-name{font-size:14px;font-weight:900;color:var(--gold-light);font-family:'Cinzel',serif;}
.bot-info .bot-status{font-size:11px;color:var(--green);display:flex;align-items:center;gap:4px;}
.bot-info .bot-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse-green 1.5s infinite;}
@keyframes pulse-green{0%,100%{opacity:1;}50%{opacity:0.4;}}

.chat-messages{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:12px;
  padding:4px 2px 12px;
  scrollbar-width:thin;scrollbar-color:rgba(255,215,0,0.2) transparent;
}
.chat-messages::-webkit-scrollbar{width:3px;}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(255,215,0,0.2);border-radius:3px;}

.msg{display:flex;gap:8px;align-items:flex-end;max-width:88%;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg.bot{align-self:flex-start;}

.msg-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.msg.bot .msg-avatar{background:linear-gradient(135deg,#5a1fb5,#a259ff);}
.msg.user .msg-avatar{background:linear-gradient(135deg,#1a3a6a,#2563eb);}

.msg-bubble{
  padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5;
  max-width:260px;word-break:break-word;
}
.msg.bot .msg-bubble{
  background:linear-gradient(135deg,var(--card2),#1a1a32);
  border:1px solid rgba(255,215,0,0.1);
  border-bottom-left-radius:4px;color:var(--text);
}
.msg.user .msg-bubble{
  background:linear-gradient(135deg,#1a3a6a,#1e4080);
  border:1px solid rgba(100,160,255,0.2);
  border-bottom-right-radius:4px;color:#e0eeff;
}

.typing-indicator{display:flex;gap:5px;padding:12px 16px;}
.typing-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--gold);opacity:0.5;
  animation:typing 1.2s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:0.2s;}
.typing-dot:nth-child(3){animation-delay:0.4s;}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:0.5;}30%{transform:translateY(-6px);opacity:1;}}

.quick-questions{
  display:flex;flex-wrap:wrap;gap:7px;
  padding:8px 0 4px;
}
.quick-btn{
  background:rgba(255,215,0,0.07);
  border:1px solid rgba(255,215,0,0.2);
  color:var(--gold-light);font-size:11px;font-weight:700;
  padding:6px 12px;border-radius:20px;cursor:pointer;
  transition:all 0.2s;font-family:'Nunito',sans-serif;
}
.quick-btn:hover{background:rgba(255,215,0,0.15);border-color:var(--gold);}

.chat-input-area{
  display:flex;gap:8px;padding-top:10px;
  border-top:1px solid rgba(255,215,0,0.08);
}
.chat-input{
  flex:1;background:var(--card2);
  border:1px solid rgba(255,215,0,0.15);
  border-radius:24px;padding:11px 16px;
  color:var(--text);font-family:'Nunito',sans-serif;font-size:13px;
  outline:none;transition:border 0.2s;
  resize:none;
}
.chat-input:focus{border-color:rgba(255,215,0,0.4);}
.chat-input::placeholder{color:var(--sub);}
.send-btn{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold3),var(--gold));
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:all 0.2s;flex-shrink:0;
  box-shadow:0 4px 16px rgba(255,215,0,0.3);
}
.send-btn:hover{transform:scale(1.08);box-shadow:0 6px 20px rgba(255,215,0,0.45);}
.send-btn:active{transform:scale(0.95);}

/* TOAST */
.toast{
  position:fixed;top:68px;left:50%;
  transform:translateX(-50%) translateY(-20px);
  background:rgba(22,22,42,0.97);
  border:1px solid rgba(255,215,0,0.3);
  color:white;padding:10px 20px;border-radius:30px;
  font-size:12px;font-weight:700;z-index:999;
  opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav>
  <div class="logo">🎬 DramlarUz</div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('uz')">UZ</button>
    <button class="lang-btn" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
  </div>
</nav>

<div class="toast" id="toast"></div>

<!-- ══════════════ COIN PAGE ══════════════ -->
<div class="page active" id="page-coin">
  <div class="coin-page">

    <div class="coin-balance">
      <div class="label" data-i18n="balance">TANGALARINGIZ</div>
      <div class="amount">🪙 <span id="coin-count">0</span></div>
    </div>

    <!-- ORNATE COIN SVG -->
    <div class="coin-wrap" id="coin-wrap" onclick="tapCoin(event)">
      <svg class="coin-svg" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Base gold gradient -->
          <radialGradient id="coinBase" cx="38%" cy="32%" r="65%">
            <stop offset="0%" stop-color="#fff8c0"/>
            <stop offset="25%" stop-color="#ffd700"/>
            <stop offset="55%" stop-color="#d4a000"/>
            <stop offset="80%" stop-color="#8a6000"/>
            <stop offset="100%" stop-color="#5a3e00"/>
          </radialGradient>
          <!-- Rim gradient -->
          <radialGradient id="rimGrad" cx="50%" cy="50%" r="50%">
            <stop offset="80%" stop-color="#b8860b"/>
            <stop offset="95%" stop-color="#8a6500"/>
            <stop offset="100%" stop-color="#5a3e00"/>
          </radialGradient>
          <!-- Inner shine -->
          <radialGradient id="innerShine" cx="35%" cy="30%" r="50%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
            <stop offset="60%" stop-color="rgba(255,255,255,0)"/>
          </radialGradient>
          <!-- Edge shadow -->
          <radialGradient id="edgeShadow" cx="50%" cy="50%" r="50%">
            <stop offset="75%" stop-color="rgba(0,0,0,0)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0.55)"/>
          </radialGradient>
          <filter id="emboss">
            <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>

        <!-- Outer rim shadow -->
        <circle cx="110" cy="114" r="101" fill="rgba(0,0,0,0.45)"/>
        <!-- Outer rim -->
        <circle cx="110" cy="110" r="101" fill="url(#rimGrad)"/>
        <!-- Rim teeth / milling pattern -->
        <g opacity="0.6">
          <script type="text/javascript">/* rendered via JS below */</script>
        </g>
        <!-- Main coin face -->
        <circle cx="110" cy="110" r="94" fill="url(#coinBase)"/>
        <!-- Edge shadow overlay -->
        <circle cx="110" cy="110" r="94" fill="url(#edgeShadow)"/>

        <!-- Decorative outer ring line -->
        <circle cx="110" cy="110" r="88" fill="none" stroke="rgba(255,230,80,0.5)" stroke-width="1.2"/>
        <circle cx="110" cy="110" r="82" fill="none" stroke="rgba(180,130,0,0.4)" stroke-width="0.8"/>

        <!-- Ornate border pattern - dots ring -->
        <g id="dot-ring" opacity="0.7"></g>

        <!-- Corner flourish petals -->
        <!-- Top petal -->
        <path d="M110 32 C100 50 88 58 90 74 C95 65 105 60 110 52 C115 60 125 65 130 74 C132 58 120 50 110 32Z" fill="rgba(255,220,50,0.55)" stroke="rgba(200,150,0,0.5)" stroke-width="0.7"/>
        <!-- Bottom petal -->
        <path d="M110 188 C100 170 88 162 90 146 C95 155 105 160 110 168 C115 160 125 155 130 146 C132 162 120 170 110 188Z" fill="rgba(255,220,50,0.55)" stroke="rgba(200,150,0,0.5)" stroke-width="0.7"/>
        <!-- Left petal -->
        <path d="M32 110 C50 100 58 88 74 90 C65 95 60 105 52 110 C60 115 65 125 74 130 C58 132 50 120 32 110Z" fill="rgba(255,220,50,0.55)" stroke="rgba(200,150,0,0.5)" stroke-width="0.7"/>
        <!-- Right petal -->
        <path d="M188 110 C170 100 162 88 146 90 C155 95 160 105 168 110 C160 115 155 125 146 130 C162 132 170 120 188 110Z" fill="rgba(255,220,50,0.55)" stroke="rgba(200,150,0,0.5)" stroke-width="0.7"/>

        <!-- Diagonal corner ornaments -->
        <path d="M55 55 L68 65 L65 68 L53 57Z" fill="rgba(255,220,50,0.45)"/>
        <path d="M165 55 L152 65 L155 68 L167 57Z" fill="rgba(255,220,50,0.45)"/>
        <path d="M55 165 L68 155 L65 152 L53 163Z" fill="rgba(255,220,50,0.45)"/>
        <path d="M165 165 L152 155 L155 152 L167 163Z" fill="rgba(255,220,50,0.45)"/>

        <!-- Inner circle frame -->
        <circle cx="110" cy="110" r="58" fill="none" stroke="rgba(255,220,50,0.4)" stroke-width="1.5"/>
        <circle cx="110" cy="110" r="54" fill="rgba(0,0,0,0.12)"/>
        <circle cx="110" cy="110" r="54" fill="none" stroke="rgba(255,200,0,0.25)" stroke-width="0.8"/>

        <!-- Center star / arabesque -->
        <!-- 8-pointed star -->
        <polygon points="110,62 116,92 140,84 122,104 148,110 122,116 140,136 116,128 110,158 104,128 80,136 98,116 72,110 98,104 80,84 104,92" fill="rgba(255,215,0,0.18)" stroke="rgba(255,200,0,0.5)" stroke-width="0.8"/>

        <!-- Central 🎬 / drama symbol -->
        <text x="110" y="120" text-anchor="middle" dominant-baseline="middle"
          font-size="36" font-family="serif" fill="rgba(255,240,100,0.9)"
          filter="url(#emboss)">🎬</text>

        <!-- UZ text arc at top -->
        <path id="topArc" d="M 40,110 A 70,70 0 0,1 180,110" fill="none"/>
        <text font-size="8" fill="rgba(255,230,80,0.8)" font-family="'Cinzel',serif" letter-spacing="3">
          <textPath href="#topArc" startOffset="18%">• DRAMLARUZ •</textPath>
        </text>

        <!-- value text bottom -->
        <path id="botArc" d="M 50,120 A 65,65 0 0,0 170,120" fill="none"/>
        <text font-size="7.5" fill="rgba(255,200,60,0.7)" font-family="'Cinzel',serif" letter-spacing="2">
          <textPath href="#botArc" startOffset="22%">✦ 1 TANGA ✦</textPath>
        </text>

        <!-- Inner shine overlay -->
        <circle cx="110" cy="110" r="94" fill="url(#innerShine)"/>
      </svg>

      <!-- Pulsing rings -->
      <div class="coin-ring-anim">
        <div class="cring"></div>
        <div class="cring"></div>
        <div class="cring"></div>
      </div>
    </div>
